<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로그인 — NextBio 영업앱</title>
<link rel="stylesheet" href="app.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">📝</div>
    <h1>NextBio 영업앱</h1>
    <div class="sub">영업팀 전용 · 허가된 사용자만 접속할 수 있습니다.</div>

    <label>아이디</label>
    <input type="text" id="id" placeholder="아이디" autocomplete="username" />
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="btn blue" onclick="doLogin()">로그인</button>
    <div class="login-err" id="err">아이디 또는 비밀번호가 올바르지 않습니다.</div>

    <div class="demo-accts">
      <div class="t">데모 계정 (클릭하면 자동 입력 · 비번 1234)</div>
      <div id="accts"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">※ 데모용 로그인입니다. 실제 보안 인증은 서버 연결 단계에서 적용됩니다.</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if(currentUser()) location.replace('index.html');
  document.getElementById('accts').innerHTML=USERS.map(u=>
    `<div class="acct" onclick="pick('${u.id}')"><span><b>${u.name}</b> · ${u.team} <span class="r">(${u.role})</span></span><span class="r">${u.id}</span></div>`).join('');
  function pick(id){ document.getElementById('id').value=id; document.getElementById('pw').value='1234'; }
  function doLogin(){
    const u=login(document.getElementById('id').value.trim(), document.getElementById('pw').value);
    if(u){ location.href='index.html'; } else { document.getElementById('err').style.display='block'; }
  }
</script>
</body>
</html>
